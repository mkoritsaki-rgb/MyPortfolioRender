<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game - Classic Mode</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="game-container">
        <h1>SNAKE CLASSIC</h1>
        
        <div class="score-board">
            <div class="score-box">ΣΚΟΡ: <span id="currentScore">0</span></div>
            <div class="score-box">HIGH SCORE: <span id="highScore">0</span></div>
        </div>

        <canvas id="gameCanvas" width="400" height="400"></canvas>

       <div class="controls-hint"> 
            <button class="key" onclick="changeDirection('up')">▲</button>
            <div class="row">
                <button class="key" onclick="changeDirection('left')">◀</button> 
                <button class="key" onclick="changeDirection('down')">▼</button>
                <button class="key" onclick="changeDirection('right')">▶</button>
            </div>
        </div> 
    </div>

    <script src="script.js"></script>
</body>
</html>
